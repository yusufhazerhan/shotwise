name: shotwise-dev

services:
  app:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.dev
    container_name: shotwise-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_URL: http://localhost:${WEB_PORT:-3003}
      NEXT_PUBLIC_APP_URL: http://localhost:${WEB_PORT:-3003}
    ports:
      - "${WEB_PORT:-3003}:3000"
    command: >
      /bin/sh -c "
      cd /repo/apps/web &&
      pnpm dev --hostname 0.0.0.0
      "
