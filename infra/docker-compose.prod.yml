name: shotwise

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-shotwise/shotwise}:${IMAGE_TAG:-latest}
    container_name: shotwise-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks: [shotwise]

  caddy:
    image: caddy:2-alpine
    container_name: shotwise-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on: [app]
    networks: [shotwise]

volumes:
  caddy_data:
  caddy_config:

networks:
  shotwise:
    driver: bridge
