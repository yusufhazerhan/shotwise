<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shotwise — Design overview</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="brand.css">
<style>
  html, body { height: 100%; background: var(--cream-2); }
  .frame {
    width: 100%; height: 100%; border: 0; display: block;
    background: var(--cream);
  }
  .ab {
    width: 100%; height: 100%; overflow: hidden; background: white;
    position: relative;
  }
  .ab .open {
    position: absolute; top: 12px; right: 12px; z-index: 3;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(245,239,230,0.92); color: var(--ink);
    border: 1px solid var(--line); font-size: 12px; font-weight: 600;
    text-decoration: none; backdrop-filter: blur(8px);
    box-shadow: var(--shadow-sm);
  }
  .ab .open:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }
</style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<div id="root"></div>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function PageFrame({ src, openHref }) {
    return (
      <div className="ab">
        <a className="open" href={openHref} target="_blank" rel="noopener">Open ↗</a>
        <iframe className="frame" src={src} title={src} loading="lazy"></iframe>
      </div>
    );
  }

  const App = () => (
    <DesignCanvas
      title="Shotwise"
      subtitle="Six pages — landing, editor, wizard, dashboard, pricing, auth"
      defaultZoom={0.45}
    >
      <DCSection id="marketing" title="Marketing">
        <DCArtboard id="landing" label="01 — Landing" width={1440} height={2400}>
          <PageFrame src="landing.html" openHref="landing.html" />
        </DCArtboard>
        <DCArtboard id="pricing" label="05 — Pricing" width={1440} height={2400}>
          <PageFrame src="pricing.html" openHref="pricing.html" />
        </DCArtboard>
        <DCArtboard id="auth" label="06 — Auth" width={1440} height={900}>
          <PageFrame src="auth.html" openHref="auth.html" />
        </DCArtboard>
      </DCSection>

      <DCSection id="app" title="App">
        <DCArtboard id="dashboard" label="04 — Dashboard" width={1440} height={1800}>
          <PageFrame src="dashboard.html" openHref="dashboard.html" />
        </DCArtboard>
        <DCArtboard id="editor" label="02 — Editor (Manual)" width={1440} height={900}>
          <PageFrame src="editor.html" openHref="editor.html" />
        </DCArtboard>
        <DCArtboard id="wizard" label="03 — Wizard" width={1440} height={1200}>
          <PageFrame src="wizard.html" openHref="wizard.html" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
