<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wizard — Shotwise</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="brand.css">
<style>
  body { background: var(--cream); }
  .wiz-shell {
    min-height: 100vh; display: flex; flex-direction: column;
  }

  .wiz-top {
    position: sticky; top: 0; z-index: 5;
    background: rgba(245, 239, 230, 0.92); backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .wiz-top-inner { height: 64px; display:flex; align-items:center; gap: 20px; }
  .save-pill {
    margin-left: auto; display:flex; align-items:center; gap: 8px;
    font-size: 12.5px; color: var(--ink-mute);
  }
  .save-pill::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #5BAE7F;
  }

  /* Stepper */
  .stepper {
    padding: 36px 0 8px;
  }
  .stepper-inner { max-width: 760px; margin: 0 auto; padding: 0 28px; }
  .stepper-meta { display:flex; justify-content: space-between; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--ink-mute); margin-bottom: 12px; letter-spacing: 0.04em; }
  .stepper-meta b { color: var(--ink); font-weight: 600; }
  .stepper-bar {
    height: 4px; background: rgba(30,58,46,0.10);
    border-radius: 999px; overflow: hidden;
  }
  .stepper-bar > div {
    height: 100%; background: linear-gradient(90deg, var(--ink), var(--coral));
    border-radius: 999px; transition: width .4s cubic-bezier(.2,.7,.3,1);
  }
  .stepper-dots {
    display:flex; justify-content: space-between; margin-top: 16px;
  }
  .stepper-dots .d {
    flex: 1; text-align: center; font-size: 11.5px; color: var(--ink-mute); font-weight: 500;
    position: relative;
  }
  .stepper-dots .d::before {
    content:''; display:block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--cream-3); margin: 0 auto 6px; transition: all .25s;
  }
  .stepper-dots .d.done::before { background: var(--ink); }
  .stepper-dots .d.cur::before { background: var(--coral); box-shadow: 0 0 0 4px var(--coral-soft); }
  .stepper-dots .d.cur { color: var(--ink); font-weight: 600; }
  .stepper-dots .d.done { color: var(--ink); }

  /* Stage */
  .stage {
    flex: 1; padding: 48px 0 80px;
  }
  .stage-inner { max-width: 600px; margin: 0 auto; padding: 0 24px; }

  .step-eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--coral-2);
    letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500;
  }
  .step-h {
    font-size: 38px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; margin-top: 8px;
  }
  .step-sub {
    font-size: 16.5px; color: var(--ink-soft); margin-top: 12px; line-height: 1.5;
  }

  .step-body { margin-top: 32px; }

  .field { margin-bottom: 18px; }
  .field .label { display:flex; align-items:center; justify-content: space-between; }
  .req { color: var(--coral); font-size: 12px; font-weight: 700; }
  .ct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); }

  /* Feature inputs (expandable) */
  .feat-list { display:flex; flex-direction: column; gap: 8px; }
  .feat-list input { width: 100%; }
  .feat-row { display:flex; gap: 8px; align-items: center; }
  .feat-row .num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); width: 18px; }
  .feat-row .x { background: transparent; border: 0; color: var(--ink-mute); cursor: pointer; padding: 6px; }
  .feat-row .x:hover { color: var(--coral); }
  .add-feat {
    background: transparent; border: 1px dashed var(--line-2);
    color: var(--ink-soft); padding: 10px; width: 100%;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    margin-top: 4px;
  }
  .add-feat:hover { border-color: var(--ink); color: var(--ink); }

  /* Step 2 — Upload */
  .uploader {
    border: 1.5px dashed var(--line-2); border-radius: 16px;
    padding: 56px 24px; text-align: center;
    background: var(--cream); transition: all .2s;
    cursor: pointer;
  }
  .uploader:hover { border-color: var(--coral); background: rgba(217,119,87,0.04); }
  .uploader .icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--cream-2); border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    margin: 0 auto 16px; font-size: 22px; color: var(--ink);
  }
  .uploader h4 { font-size: 17px; font-weight: 700; }
  .uploader p { font-size: 13px; color: var(--ink-mute); margin-top: 6px; }
  .upload-grid {
    margin-top: 20px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }
  .upload-card {
    background: white; border: 1px solid var(--line); border-radius: 12px;
    padding: 10px; position: relative;
  }
  .upload-card .thumb {
    aspect-ratio: 9/19.5; background: linear-gradient(180deg, #F5EFE6, #ECE2D2);
    border-radius: 7px; border: 1px solid var(--line); position: relative; overflow: hidden;
  }
  .upload-card .thumb::after {
    content:''; position:absolute; inset: 8px 4px 4px;
    background: white; border-radius: 4px;
  }
  .upload-card .nm { font-size: 11px; margin-top: 8px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upload-card .rm {
    position:absolute; top: 6px; right: 6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(30,58,46,0.7); color: white;
    border: 0; cursor: pointer; font-size: 11px;
    display:flex; align-items:center; justify-content:center;
    opacity: 0; transition: opacity .15s;
  }
  .upload-card:hover .rm { opacity: 1; }

  /* Step 3 — Analyzing */
  .analyze-card {
    background: white; border: 1px solid var(--line); border-radius: 20px;
    padding: 56px 32px; text-align: center;
  }
  .pulse-orb {
    width: 96px; height: 96px; margin: 0 auto 28px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 30% 30%, var(--coral), transparent 60%),
      radial-gradient(circle at 70% 70%, var(--ink), transparent 60%),
      var(--cream-2);
    position: relative;
    animation: orb-pulse 2s ease-in-out infinite;
  }
  .pulse-orb::after {
    content:''; position:absolute; inset: -8px;
    border-radius: 50%; border: 2px solid var(--coral);
    opacity: 0.3; animation: orb-ring 2s ease-out infinite;
  }
  @keyframes orb-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  @keyframes orb-ring { 0% { transform: scale(1); opacity: .35; } 100% { transform: scale(1.3); opacity: 0; } }
  .analyze-card h3 { font-size: 22px; }
  .analyze-card p { margin-top: 10px; font-size: 14.5px; }
  .analyze-progress {
    margin-top: 28px; display:flex; flex-direction: column; gap: 8px; text-align: left;
  }
  .analyze-progress .line {
    display:flex; align-items:center; gap: 10px; font-size: 13px; color: var(--ink-soft);
    padding: 8px 12px; border-radius: 8px; background: var(--cream-2);
  }
  .analyze-progress .line.done { color: var(--ink); }
  .analyze-progress .line .st { width: 14px; height: 14px; border-radius: 50%; background: var(--cream-3); flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size: 9px; color: white; }
  .analyze-progress .line.done .st { background: var(--ink); }
  .analyze-progress .line.cur .st { background: var(--coral); animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: 0.5; } }

  /* Step 4 — Review */
  .review-card {
    background: white; border: 1px solid var(--line); border-radius: 16px;
    padding: 20px; display:grid; grid-template-columns: 120px 1fr; gap: 20px;
    margin-bottom: 16px;
  }
  .review-thumb {
    aspect-ratio: 9/19.5;
    background: linear-gradient(180deg, #F5EFE6, #ECE2D2);
    border-radius: 10px; border: 1px solid var(--line); position: relative; overflow:hidden;
  }
  .review-thumb::after { content:''; position:absolute; inset: 8px 4px 4px; background: white; border-radius: 5px; }
  .review-body .desc { font-size: 13px; color: var(--ink-mute); margin-bottom: 14px; font-style: italic; }
  .title-opts { display:flex; flex-direction:column; gap: 8px; }
  .topt {
    border: 1px solid var(--line-2); border-radius: 10px;
    padding: 12px 14px; cursor: pointer; font-size: 14px;
    background: var(--cream); color: var(--ink-soft);
    display:flex; gap: 10px; align-items: flex-start;
    transition: all .15s;
  }
  .topt:hover { border-color: var(--ink); color: var(--ink); }
  .topt.sel { border-color: var(--ink); background: white; color: var(--ink); box-shadow: var(--shadow-sm); }
  .topt .ring {
    width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--line-2);
    flex-shrink: 0; margin-top: 1px;
  }
  .topt.sel .ring { border-color: var(--ink); background: var(--ink); position: relative; }
  .topt.sel .ring::after { content:''; position:absolute; inset: 3px; background: var(--cream); border-radius: 50%; }
  .review-foot { display:flex; align-items:center; gap: 10px; margin-top: 14px; }
  .review-foot input { flex: 1; }

  /* Step 5 — Style */
  .styles { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .style-card {
    background: white; border: 1.5px solid var(--line); border-radius: 16px;
    padding: 12px; cursor: pointer; transition: all .2s;
    position: relative;
  }
  .style-card.sel { border-color: var(--ink); box-shadow: var(--shadow-md); }
  .style-card .preview {
    aspect-ratio: 9/19.5; border-radius: 10px; padding: 14px 8px;
    display:flex; flex-direction: column; align-items: stretch;
    overflow: hidden;
  }
  .style-card .preview .tt {
    font-size: 9px; font-weight: 800; line-height: 1.1; text-align: center;
    letter-spacing: -0.02em; margin-bottom: 6px;
  }
  .style-card .preview .tt em { font-style: normal; }
  .style-card .preview .ph {
    flex: 1; background: white; border-radius: 6px; box-shadow: 0 4px 8px rgba(0,0,0,0.08);
  }
  .style-card .meta {
    display:flex; align-items:center; justify-content: space-between;
    padding: 10px 4px 2px; font-size: 12.5px; font-weight: 600;
  }
  .style-card .meta .dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--line-2); }
  .style-card.sel .meta .dot { background: var(--ink); border-color: var(--ink); }

  /* preview variants */
  .preview.cream { background: linear-gradient(180deg, #F5EFE6, #E8DFCF); color: #1E3A2E; }
  .preview.cream em { color: #D97757; }
  .preview.dark { background: #1A1A1A; color: #F5EFE6; }
  .preview.dark em { color: #D97757; }
  .preview.color { background: linear-gradient(180deg, #2A6FDB, #1E3A2E); color: #F5EFE6; }
  .preview.color em { color: #FFD66B; }
  .preview.premium { background: linear-gradient(180deg, #1E3A2E, #0D1F18); color: #F5EFE6; }
  .preview.premium em { color: #D9B26B; }

  /* Step 5b — Languages */
  .lang-grid {
    display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .lang {
    display:flex; align-items:center; gap: 10px;
    background: white; border: 1px solid var(--line-2);
    border-radius: 10px; padding: 12px 14px;
    cursor: pointer; transition: all .15s;
    font-size: 13.5px; font-weight: 500;
  }
  .lang:hover { border-color: var(--ink); }
  .lang.sel { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .lang .chk {
    width: 16px; height: 16px; border-radius: 4px;
    border: 1.5px solid var(--line-2); flex-shrink: 0;
    display:flex; align-items:center; justify-content:center;
    font-size: 10px; color: transparent;
  }
  .lang.sel .chk { background: var(--coral); border-color: var(--coral); color: white; }
  .lang .flag {
    width: 22px; height: 16px; background: var(--cream-3); border-radius: 3px;
    display:flex; align-items:center; justify-content:center; font-size: 9px; font-weight: 800;
    color: var(--ink); font-family: 'JetBrains Mono', monospace;
  }
  .lang.sel .flag { background: var(--cream); color: var(--ink); }

  /* Step 6 — Generate */
  .summary-card {
    background: white; border: 1px solid var(--line); border-radius: 16px;
    padding: 28px;
  }
  .summary-stats { display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 18px; }
  .summary-stats .s {
    text-align: center;
  }
  .summary-stats .s .num { font-size: 36px; font-weight: 800; letter-spacing: -0.03em; color: var(--ink); }
  .summary-stats .s .lab { font-size: 12px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-top: 4px; }

  .gen-progress { margin-top: 28px; }
  .gen-progress .bar { height: 8px; background: var(--cream-3); border-radius: 999px; overflow: hidden; }
  .gen-progress .bar > div { height: 100%; background: var(--ink); width: 0%; transition: width .3s ease; border-radius: 999px; }
  .gen-progress .meta { display:flex; justify-content: space-between; font-size: 12px; color: var(--ink-mute); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

  .success-tick {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--ink); color: var(--coral);
    margin: 0 auto 20px; display:flex; align-items:center; justify-content:center;
    font-size: 28px; font-weight: 800;
  }

  /* Footer nav */
  .wiz-foot {
    position: sticky; bottom: 0;
    background: rgba(245, 239, 230, 0.92); backdrop-filter: saturate(140%) blur(10px);
    border-top: 1px solid var(--line);
    padding: 16px 0;
  }
  .wiz-foot-inner { display:flex; align-items:center; gap: 12px; }
  .wiz-foot .pg { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-mute); margin-left: auto; }

  /* Step transition */
  .step-enter { animation: stepIn .35s cubic-bezier(.2,.7,.3,1) both; }
  @keyframes stepIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<div class="wiz-shell" data-screen-label="03 Wizard">

  <div class="wiz-top">
    <div class="container wiz-top-inner">
      <a href="dashboard.html" class="logo"><span class="logo-mark">S</span> shotwise</a>
      <span class="pill">AI Wizard</span>
      <div class="save-pill">Draft saved · just now</div>
      <a href="editor.html" class="btn btn-ghost btn-sm">Switch to Manual</a>
      <a href="dashboard.html" class="btn btn-ghost btn-sm">Exit</a>
    </div>
  </div>

  <div class="stepper">
    <div class="stepper-inner">
      <div class="stepper-meta">
        <span>STEP <b id="stepNum">1</b> / 6</span>
        <span id="stepName">Tell us about your app</span>
      </div>
      <div class="stepper-bar"><div id="stepFill" style="width: 16%;"></div></div>
      <div class="stepper-dots" id="stepDots">
        <div class="d cur">App</div>
        <div class="d">Upload</div>
        <div class="d">Analyze</div>
        <div class="d">Titles</div>
        <div class="d">Style</div>
        <div class="d">Export</div>
      </div>
    </div>
  </div>

  <main class="stage">
    <div class="stage-inner" id="stage"></div>
  </main>

  <div class="wiz-foot">
    <div class="container wiz-foot-inner">
      <button class="btn btn-ghost" id="prevBtn">← Back</button>
      <div class="spacer"></div>
      <span class="pg" id="pgTxt">1 of 6</span>
      <button class="btn btn-primary" id="nextBtn">Continue →</button>
    </div>
  </div>

</div>

<!-- Templates -->
<template id="tpl-1">
  <div class="step-enter">
    <span class="step-eyebrow">// Step 1 — About your app</span>
    <h1 class="step-h">Tell us about your app.</h1>
    <p class="step-sub">Three short fields plus a few features. The AI uses them to write titles that match your tone.</p>

    <div class="step-body">
      <div class="field">
        <div class="label"><span class="label">App name <span class="req">required</span></span></div>
        <input class="input" placeholder="e.g. Petwises" value="Petwises" id="f-name">
      </div>
      <div class="field">
        <span class="label">Category</span>
        <select class="select">
          <option>Productivity</option>
          <option>Health & Fitness</option>
          <option>Lifestyle</option>
          <option>Education</option>
          <option selected>Pets</option>
          <option>Finance</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <div class="label"><span class="label">Tagline <span class="req">required</span></span><span class="ct" id="ct-tag">38 / 100</span></div>
        <input class="input" maxlength="100" value="Pet care, without the chaos." id="f-tag">
      </div>
      <div class="field">
        <div class="label"><span class="label">Description</span><span class="ct" id="ct-desc">142 / 500</span></div>
        <textarea class="textarea" rows="4" maxlength="500" id="f-desc">A calm, family-friendly app to track vaccines, vet visits, weight, and daily care for multi-pet households. iOS first.</textarea>
      </div>
      <div class="field">
        <span class="label">Target audience <span class="dim" style="font-weight: 400; font-size: 12px;">(optional)</span></span>
        <input class="input" placeholder="e.g. solo founders" value="Pet parents in multi-pet homes">
      </div>
      <div class="field">
        <span class="label">Key features <span class="dim" style="font-weight: 400; font-size: 12px;">(3–5)</span></span>
        <div class="feat-list" id="featList">
          <div class="feat-row"><span class="num">1</span><input class="input" value="Track vaccines and vet visits"><button class="x" title="Remove">✕</button></div>
          <div class="feat-row"><span class="num">2</span><input class="input" value="Shared family calendar"><button class="x">✕</button></div>
          <div class="feat-row"><span class="num">3</span><input class="input" value="Weight & habit insights"><button class="x">✕</button></div>
        </div>
        <button class="add-feat" id="addFeat">+ Add feature</button>
      </div>
    </div>
  </div>
</template>

<template id="tpl-2">
  <div class="step-enter">
    <span class="step-eyebrow">// Step 2 — Upload screenshots</span>
    <h1 class="step-h">Drop your screenshots.</h1>
    <p class="step-sub">Drag any number of simulator captures — iPhone, iPad, Android. Reorder them by dragging the cards.</p>

    <div class="step-body">
      <div class="uploader">
        <div class="icon">⇣</div>
        <h4>Drop screenshots here, or click to browse</h4>
        <p>PNG or JPG · up to 10 files · max 8 MB each</p>
      </div>

      <div class="upload-grid">
        <div class="upload-card"><div class="thumb"></div><div class="nm">01_home.png</div><button class="rm">✕</button></div>
        <div class="upload-card"><div class="thumb"></div><div class="nm">02_schedule.png</div><button class="rm">✕</button></div>
        <div class="upload-card"><div class="thumb"></div><div class="nm">03_petcard.png</div><button class="rm">✕</button></div>
        <div class="upload-card"><div class="thumb"></div><div class="nm">04_share.png</div><button class="rm">✕</button></div>
        <div class="upload-card"><div class="thumb"></div><div class="nm">05_insights.png</div><button class="rm">✕</button></div>
      </div>
      <p style="margin-top: 14px; font-size: 12.5px; color: var(--ink-mute); font-family: 'JetBrains Mono', monospace;">5 of 10 uploaded · drag to reorder</p>
    </div>
  </div>
</template>

<template id="tpl-3">
  <div class="step-enter">
    <span class="step-eyebrow">// Step 3 — Analyzing</span>
    <h1 class="step-h">Reading your screenshots…</h1>
    <p class="step-sub">Our model is looking at each screen and writing title candidates that match your app's tone.</p>

    <div class="step-body">
      <div class="analyze-card">
        <div class="pulse-orb"></div>
        <h3>Generating titles · 3 of 5</h3>
        <p>This usually takes 5–15 seconds. You'll be able to edit everything on the next screen.</p>
        <div class="analyze-progress">
          <div class="line done"><div class="st">✓</div>01 — Home screen · suggested "Track your pets without the chaos."</div>
          <div class="line done"><div class="st">✓</div>02 — Schedule · suggested "Vet visits, never missed."</div>
          <div class="line cur"><div class="st">●</div>03 — Pet card · analyzing layout and copy…</div>
          <div class="line"><div class="st"></div>04 — Sharing screen · queued</div>
          <div class="line"><div class="st"></div>05 — Insights · queued</div>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="tpl-4">
  <div class="step-enter">
    <span class="step-eyebrow">// Step 4 — Review suggestions</span>
    <h1 class="step-h">Review and edit titles.</h1>
    <p class="step-sub">Pick one of three AI suggestions per screen, or write your own. You can change the accent word too.</p>

    <div class="step-body" id="reviewBody">
      <div class="review-card">
        <div class="review-thumb"></div>
        <div class="review-body">
          <div class="desc">Home screen — personalized pet card, tabs for schedule and notes, warm cream background.</div>
          <div class="title-opts">
            <div class="topt sel"><div class="ring"></div>Track your pets <strong>without the chaos.</strong></div>
            <div class="topt"><div class="ring"></div>One app for every pet in your home.</div>
            <div class="topt"><div class="ring"></div>Pet care, made calm.</div>
          </div>
          <div class="review-foot">
            <span class="label" style="white-space:nowrap; margin: 0;">Accent</span>
            <input class="input" value="without the chaos">
            <button class="btn btn-ghost btn-sm">↻ Regenerate</button>
          </div>
        </div>
      </div>

      <div class="review-card">

      <div class="lang-grid" style="margin-top: 14px;" id="langs">
        <div class="lang sel"><div class="chk">✓</div><span class="flag">EN</span>English</div>
        <div class="lang sel"><div class="chk">✓</div><span class="flag">ES</span>Spanish</div>

<template id="tpl-6">
  <div class="step-enter">
    <span class="step-eyebrow">// Step 6 — Generate</span>
    <h1 class="step-h" id="genHead">You're ready to ship.</h1>
    <p class="step-sub" id="genSub">We'll render every screenshot in every language. About 30–60 seconds total.</p>

    <div class="step-body">
      <div class="summary-card" id="summary">
        <div style="display:flex; align-items:center; gap: 12px;">
          <span class="pill pill-coral pill-dot">Ready to generate</span>
        </div>
        <p style="margin-top: 12px; color: var(--ink); font-size: 16px; font-weight: 500;">You're about to generate <strong>5 screenshots</strong> in <strong>7 languages</strong> — 35 final images.</p>
        <div class="summary-stats">
          <div class="s"><div class="num">5</div><div class="lab">Screens</div></div>
          <div class="s"><div class="num">7</div><div class="lab">Languages</div></div>
          <div class="s"><div class="num">35</div><div class="lab">Images</div></div>
        </div>

        <div class="gen-progress" id="genProg" style="display:none;">
          <div class="bar"><div id="genBar"></div></div>
          <div class="meta">
            <span id="genLabel">Rendering · EN · 1 of 5</span>
            <span id="genPct">0%</span>
          </div>
        </div>
      </div>

      <div id="genActions" style="margin-top: 20px; display:flex; gap: 10px; justify-content: center;">
        <button class="btn btn-primary btn-lg" id="genGo">⚡ Generate screenshots</button>
      </div>

      <div id="genDone" style="display:none; text-align:center; margin-top: 24px;">
        <div class="success-tick">✓</div>
        <h3>Done! 35 screenshots ready.</h3>
        <p style="margin-top: 8px;">Your ZIP is 28.4 MB. App Store Connect upload is a Pro feature.</p>
        <div style="display:flex; gap: 10px; justify-content: center; margin-top: 22px;">
          <button class="btn btn-primary btn-lg">⇣ Download ZIP</button>
          <button class="btn btn-ghost btn-lg">↗ Export to App Store Connect <span class="pill pill-coral" style="margin-left: 6px;">Pro</span></button>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
const STEPS = [
  { id: 1, name: 'Tell us about your app',  tpl: 'tpl-1' },
  { id: 2, name: 'Upload screenshots',      tpl: 'tpl-2' },
  { id: 3, name: 'AI is analyzing',         tpl: 'tpl-3' },
  { id: 4, name: 'Review AI suggestions',   tpl: 'tpl-4' },
  { id: 5, name: 'Pick your style',         tpl: 'tpl-5' },
  { id: 6, name: 'Generate',                tpl: 'tpl-6' },
];
let cur = 0;
const stage = document.getElementById('stage');

function render(){
  const s = STEPS[cur];
  const tpl = document.getElementById(s.tpl);
  stage.innerHTML = '';
  stage.appendChild(tpl.content.cloneNode(true));

  document.getElementById('stepNum').textContent = s.id;
  document.getElementById('stepName').textContent = s.name;
  document.getElementById('pgTxt').textContent = `${s.id} of 6`;
  document.getElementById('stepFill').style.width = (s.id / 6 * 100) + '%';
  document.getElementById('stepDots').querySelectorAll('.d').forEach((d, i) => {
    d.classList.toggle('done', i < cur);
    d.classList.toggle('cur',  i === cur);
  });
  document.getElementById('prevBtn').disabled = (cur === 0);
  document.getElementById('prevBtn').style.opacity = cur === 0 ? .4 : 1;

  const nextBtn = document.getElementById('nextBtn');
  if (cur === 5) {
    nextBtn.textContent = 'Finish ✓';
  } else if (cur === 2) {
    nextBtn.textContent = 'Skip wait →';
  } else {
    nextBtn.textContent = 'Continue →';
  }

  hookStep();
}

function hookStep(){
  // Step 1 — counters + add feature
  const fTag = document.getElementById('f-tag');
  const fDesc = document.getElementById('f-desc');
  if (fTag) fTag.addEventListener('input', () => document.getElementById('ct-tag').textContent = `${fTag.value.length} / 100`);
  if (fDesc) fDesc.addEventListener('input', () => document.getElementById('ct-desc').textContent = `${fDesc.value.length} / 500`);
  const add = document.getElementById('addFeat');
  if (add) add.addEventListener('click', () => {
    const list = document.getElementById('featList');
    const n = list.children.length + 1;
    if (n > 5) { add.style.opacity = .5; return; }
    const row = document.createElement('div');
    row.className = 'feat-row';
    row.innerHTML = `<span class="num">${n}</span><input class="input" placeholder="New feature"><button class="x">✕</button>`;
    list.appendChild(row);
    row.querySelector('.x').addEventListener('click', () => row.remove());
    row.querySelector('input').focus();
  });
  // Step 4 — title options
  document.querySelectorAll('.review-card').forEach(card => {
    card.querySelectorAll('.topt').forEach(t => t.addEventListener('click', () => {
      card.querySelectorAll('.topt').forEach(x => x.classList.remove('sel'));
      t.classList.add('sel');
    }));
  });
  // Step 5 — styles + langs
  document.querySelectorAll('.style-card').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('.style-card').forEach(x => x.classList.remove('sel'));
    c.classList.add('sel');
  }));
  document.querySelectorAll('.lang').forEach(l => l.addEventListener('click', () => l.classList.toggle('sel')));

  // Step 6 — generate
  const go = document.getElementById('genGo');
  if (go) go.addEventListener('click', () => {
    document.getElementById('genActions').style.display = 'none';
    document.getElementById('genProg').style.display = '';
    const bar = document.getElementById('genBar');
    const pct = document.getElementById('genPct');
    const lab = document.getElementById('genLabel');
    const langs = ['EN','ES','FR','DE','PT','JA','TR'];
    const total = 35;
    let n = 0;
    const iv = setInterval(() => {
      n++;
      const p = Math.round(n / total * 100);
      bar.style.width = p + '%'; pct.textContent = p + '%';
      const li = Math.min(Math.floor(n / 5), 6);
      const si = ((n - 1) % 5) + 1;
      lab.textContent = `Rendering · ${langs[li]} · ${si} of 5`;
      if (n >= total) {
        clearInterval(iv);
        document.getElementById('genProg').style.display = 'none';
        document.getElementById('genDone').style.display = '';
        document.getElementById('summary').style.display = 'none';
        document.getElementById('genHead').textContent = '🎉 Your screenshots are ready.';
        document.getElementById('genSub').textContent = '35 images rendered in 7 languages. The ZIP is downloadable below.';
      }
    }, 70);
  });
}

document.getElementById('prevBtn').addEventListener('click', () => { if (cur > 0) { cur--; render(); window.scrollTo(0,0); } });
document.getElementById('nextBtn').addEventListener('click', () => {
  if (cur < STEPS.length - 1) { cur++; render(); window.scrollTo(0,0); }
});

render();
</script>
</body>
</html>
